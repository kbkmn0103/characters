<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Investigation Report</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap"
rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="background">

<div class="noise"></div>

<div class="vignette"></div>

</div>


<div class="report-container">

<a href="index.html" class="back-button">

← DATABASE

</a>

<div class="report-paper">

<div class="paper-clip"></div>

<div class="confidential">

CONFIDENTIAL

</div>

<div class="report-header">

<div>

<p class="report-code">

FILE No.

</p>

<h1 id="detailName">

Character Name

</h1>

<p id="detailKana">

かな

</p>

</div>

</div>

<div class="report-main">

<div class="photo-area">

<img
id="detailImage"
src=""
alt="">

</div>

<div class="basic-info">

<h2>

基本情報

</h2>

<table>

<tr>

<th>誕生日</th>

<td id="detailBirthday"></td>

</tr>

<tr>

<th>年齢</th>

<td id="detailAge"></td>

</tr>

<tr>

<th>身長</th>

<td id="detailHeight"></td>

</tr>

<tr>

<th>所属</th>

<td id="detailOccupation"></td>

</tr>

<tr>

<th>好きなもの</th>

<td id="detailLikes"></td>

</tr>

<tr>

<th>苦手なもの</th>

<td id="detailDislikes"></td>

</tr>

</table>

</div>

</div>

<section class="report-section">

<h2>

人物概要

</h2>

<p id="detailProfile"></p>

</section>

<section class="report-section">

<h2>

調査員メモ

</h2>

<p id="detailMemo"></p>

</section>

</div>

</div>

<script src="report.js"></script>

</body>

</html>
